<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Notes List</h1>

        <a href="/note/create" class="btn btn-primary">
            Create Note
        </a>
    </div>

    <div class="card mb-3 shadow-sm"
         th:each="note : ${notes}">

        <div class="card-body">

            <h3 class="card-title"
                th:text="${note.title}">
            </h3>

            <p class="card-text"
               th:text="${note.content}">
            </p>

            <div class="d-flex gap-2">

                <form th:action="@{/note/edit}" method="get">
                    <input type="hidden"
                           name="id"
                           th:value="${note.id}">

                    <button type="submit"
                            class="btn btn-warning">
                        Edit
                    </button>
                </form>

                <form th:action="@{/note/delete}" method="post">
                    <input type="hidden"
                           name="id"
                           th:value="${note.id}">

                    <button type="submit"
                            class="btn btn-danger">
                        Delete
                    </button>
                </form>

            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
